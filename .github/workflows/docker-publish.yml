name: Build and Publish Lokinet Docker Image

on:
  push:
    branches: [ "main" ]
  schedule:
    # Run automatically every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get latest Lokinet version from upstream
        id: upstream_version
        run: |
          # Fetch the tag_name of the latest official release (e.g., v0.9.11)
          LATEST_TAG=$(curl -s https://api.github.com/repos/oxen-io/lokinet/releases/latest | jq -r .tag_name)
          # Remove the v prefix to make the image tag more standard (becomes 0.9.11)
          VERSION=${LATEST_TAG#v}
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Fetched upstream Lokinet version: $VERSION"

      - name: Check if version already exists in registry
        id: version_check
        run: |
          VERSION=${{ steps.upstream_version.outputs.upstream_version }}
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          
          echo "Checking if version $VERSION exists in ${{ env.REGISTRY }}/$IMAGE_NAME..."
          
          # Use GitHub API to check if the tag exists
          # This works without authentication for public registries
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ghcr.io/v2/$IMAGE_NAME/manifests/$VERSION" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✓ Version $VERSION already exists in registry"
            echo "version_exists=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Version $VERSION is new, will build and push"
            echo "version_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to the Container registry
        if: steps.version_check.outputs.version_exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.version_check.outputs.version_exists == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Auto-generate three types of tags: latest, specific version number, and commit sha
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.upstream_version.outputs.upstream_version }}
            type=sha,format=short

      - name: Build and push Docker image
        if: steps.version_check.outputs.version_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Skip build notification
        if: steps.version_check.outputs.version_exists == 'true'
        run: |
          echo "ℹ️  Version ${{ steps.upstream_version.outputs.upstream_version }} already exists in registry. Skipping build."
