name: Build and Publish Lokinet Docker Image

on:
  push:
    branches: [ "main" ]
  schedule:
    # Run automatically every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get latest Lokinet version from upstream
        id: upstream_version
        run: |
          # Fetch the tag_name of the latest official release (e.g., v0.9.11)
          LATEST_TAG=$(curl -s https://api.github.com/repos/oxen-io/lokinet/releases/latest | jq -r .tag_name)
          # Remove the v prefix to make the image tag more standard (becomes 0.9.11)
          VERSION=${LATEST_TAG#v}
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Fetched upstream Lokinet version: $VERSION"

      - name: Get previous successful build info
        id: previous_build
        run: |
          # Get the last successful workflow run
          RESPONSE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-publish.yml/runs?status=success&per_page=1")
          
          PREVIOUS_SHA=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_commit.id // "none"')
          
          echo "previous_sha=$PREVIOUS_SHA" >> $GITHUB_OUTPUT
          echo "Previous successful commit: $PREVIOUS_SHA"

      - name: Check if build is needed
        id: build_check
        run: |
          VERSION=${{ steps.upstream_version.outputs.upstream_version }}
          CURRENT_SHA=${{ github.sha }}
          PREVIOUS_SHA=${{ steps.previous_build.outputs.previous_sha }}
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          
          echo "Current commit SHA: $CURRENT_SHA"
          echo "Previous commit SHA: $PREVIOUS_SHA"
          echo "Upstream version: $VERSION"
          
          # Check if version exists in registry
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ghcr.io/v2/$IMAGE_NAME/manifests/$VERSION" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json")
          
          BUILD_NEEDED=false
          BUILD_REASON=""
          
          if [ "$RESPONSE" != "200" ]; then
            BUILD_NEEDED=true
            BUILD_REASON="New upstream version detected"
            echo "✗ Version $VERSION is new in upstream"
          else
            echo "✓ Version $VERSION already exists in registry"
          fi
          
          # Check if there are new commits since last build
          if [ "$CURRENT_SHA" != "$PREVIOUS_SHA" ] && [ "$PREVIOUS_SHA" != "none" ]; then
            BUILD_NEEDED=true
            if [ -z "$BUILD_REASON" ]; then
              BUILD_REASON="New commits detected"
            else
              BUILD_REASON="$BUILD_REASON + New commits detected"
            fi
            echo "✗ New commits detected since last build"
          elif [ "$PREVIOUS_SHA" = "none" ]; then
            echo "ℹ️  First build or no previous successful run"
            BUILD_NEEDED=true
            BUILD_REASON="Initial build"
          fi
          
          echo "build_needed=$BUILD_NEEDED" >> $GITHUB_OUTPUT
          echo "build_reason=$BUILD_REASON" >> $GITHUB_OUTPUT
          
          if [ "$BUILD_NEEDED" = "true" ]; then
            echo "🔨 Build will proceed: $BUILD_REASON"
          else
            echo "⏭️  Build skipped: No changes detected"
          fi

      - name: Log in to the Container registry
        if: steps.build_check.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.build_check.outputs.build_needed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Auto-generate three types of tags: latest, specific version number, and commit sha
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.upstream_version.outputs.upstream_version }}
            type=sha,format=short

      - name: Build and push Docker image
        if: steps.build_check.outputs.build_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build result notification
        run: |
          if [ "${{ steps.build_check.outputs.build_needed }}" = "true" ]; then
            echo "✅ Build completed"
            echo "Reason: ${{ steps.build_check.outputs.build_reason }}"
          else
            echo "⏭️  Build skipped: No changes detected"
          fi
